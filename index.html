<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سورپرایز شاپرک 🦋</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css');
  
  body, html {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background-color: #02010a; overflow: hidden;
    font-family: 'Vazirmatn', sans-serif;
    display: flex; justify-content: center; align-items: center;
    animation: bgPulse 8s infinite alternate ease-in-out;
  }

  @keyframes bgPulse {
    0% { background-color: #02010a; box-shadow: inset 0 0 50px rgba(161, 140, 209, 0.0); }
    100% { background-color: #0d041c; box-shadow: inset 0 0 150px rgba(161, 140, 209, 0.15); }
  }
  
  canvas { position: absolute; top: 0; left: 0; z-index: 1; }
  
  #ui-layer {
    position: absolute; z-index: 10;
    text-align: center; pointer-events: none;
    width: 100%; display: flex; flex-direction: column; align-items: center;
  }

  .btn {
    pointer-events: auto; padding: 15px 40px; font-size: 1.5rem;
    color: #fff; background: transparent;
    border: 2px solid #a18cd1; border-radius: 30px;
    cursor: pointer; transition: all 0.5s ease;
    box-shadow: 0 0 20px rgba(161, 140, 209, 0.4), inset 0 0 20px rgba(161, 140, 209, 0.4);
    text-shadow: 0 0 10px #fff; font-family: inherit;
  }
  
  .btn:hover {
    background: rgba(161, 140, 209, 0.2);
    box-shadow: 0 0 50px rgba(161, 140, 209, 1), inset 0 0 30px rgba(161, 140, 209, 0.8);
    transform: scale(1.05);
  }

  #next-btn { display: none; margin-top: 30px; font-size: 1.2rem; }

  /* استایل شاپرک */
  .butterfly-container {
    display: none; perspective: 1000px; margin: 0 auto 30px auto;
    width: 250px; height: 200px; position: relative;
    transition: transform 0.2s ease-out; 
  }
  .butterfly-float { width: 100%; height: 100%; animation: floatButterfly 4s infinite ease-in-out; }
  @keyframes floatButterfly { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
  .wing {
    position: absolute; width: 120px; height: 180px; top: 10px;
    background: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #f093fb 100%);
    box-shadow: 0 0 40px #4facfe, inset 0 0 20px rgba(255, 255, 255, 0.8); opacity: 0.85;
  }
  .wing-left { left: 5px; border-radius: 100% 20% 40% 100%; transform-origin: right center; animation: flapLeft 0.15s infinite alternate ease-in-out; }
  .wing-right { right: 5px; border-radius: 20% 100% 100% 40%; transform-origin: left center; animation: flapRight 0.15s infinite alternate ease-in-out; }
  .body { position: absolute; width: 10px; height: 110px; background: #fff; border-radius: 10px; left: 120px; top: 40px; box-shadow: 0 0 20px #fff; }
  @keyframes flapLeft { 0% { transform: rotateY(0deg) rotateX(20deg); } 100% { transform: rotateY(75deg) rotateX(0deg); } }
  @keyframes flapRight { 0% { transform: rotateY(0deg) rotateX(20deg); } 100% { transform: rotateY(-75deg) rotateX(0deg); } }

  .message-box { display: none; color: #fff; margin-bottom: 20px; }
  h1 {
    font-size: 3.5rem; margin: 0;
    background: linear-gradient(to right, #00f2fe, #f093fb, #00f2fe);
    background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: glowText 3s infinite alternate, shineText 5s linear infinite;
  }
  @keyframes shineText { to { background-position: 200% center; } }
  @keyframes glowText { from { filter: drop-shadow(0 0 10px rgba(240, 147, 251, 0.3)); } to { filter: drop-shadow(0 0 30px rgba(0, 242, 254, 0.8)); } }
  .subtitle { font-size: 1.4rem; line-height: 2; margin-top: 20px; color: #e2e8f0; opacity: 0; text-shadow: 0 0 15px rgba(255, 255, 255, 0.4); }

  /* صحنه دوم: کیک تولد */
  #cake-scene {
    display: none; position: absolute; z-index: 20; text-align: center; width: 100%; pointer-events: auto;
  }
  .cake-container { position: relative; width: 250px; height: 250px; margin: 0 auto; cursor: pointer; transform: scale(1.2); transition: transform 0.3s; }
  .cake-container:hover { transform: scale(1.25); }
  
  /* پایه‌ی کیک */
  .cake-bottom { position: absolute; bottom: 20px; left: 25px; width: 200px; height: 90px; background: linear-gradient(to bottom, #ff9a9e, #fecfef); border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 -10px 20px rgba(0,0,0,0.1); }
  .cake-top { position: absolute; bottom: 110px; left: 45px; width: 160px; height: 70px; background: linear-gradient(to bottom, #fbc2eb, #a6c1ee); border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
  
  /* شمع و شعله */
  .candle { position: absolute; bottom: 180px; left: 115px; width: 20px; height: 60px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #ff4d4d 5px, #ff4d4d 10px); border-radius: 5px; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
  .flame { position: absolute; top: -35px; left: 2px; width: 16px; height: 35px; background: #ffcc00; border-radius: 50% 50% 20% 20%; box-shadow: 0 0 20px #ffcc00, 0 0 50px #ff6600, 0 0 80px #ff3300; animation: flicker 0.1s infinite alternate; transition: opacity 0.8s ease-out; }
  @keyframes flicker { 0% { transform: scale(1) rotate(-2deg); opacity: 0.9; } 100% { transform: scale(1.1) rotate(2deg); opacity: 1; } }
  
  .cake-text {
    font-size: 1.6rem; color: #fff; margin-top: 40px; line-height: 2;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
    animation: fadeIn 2s forwards;
  }
  .highlight { color: #f093fb; font-weight: bold; font-size: 2rem; display: block; margin-top: 10px; }

  @media (max-width: 600px) {
    h1 { font-size: 2rem; } .subtitle { font-size: 1.1rem; } .butterfly-container { transform: scale(0.7); margin-bottom: 10px; } .cake-container { transform: scale(0.9); } .cake-container:hover { transform: scale(0.95); } .cake-text { font-size: 1.2rem; }
  }
</style>
</head>
<body>
  
  <!-- موزیک اول (شاپرک) -->
  <audio id="magic-music" loop><source src="tavalod.mp3" type="audio/mpeg"></audio>
  <!-- موزیک دوم (کیک) -->
  <audio id="cake-music" loop><source src="cake.mp3" type="audio/mpeg"></audio>

  <canvas id="canvas"></canvas>
  
  <!-- صحنه اول: شاپرک -->
  <div id="ui-layer">
    <button id="start-btn" class="btn" onclick="startMagic()">برای شاپرک... لمس کن 🦋</button>
    <div class="butterfly-container" id="butterfly">
      <div class="butterfly-float"><div class="wing wing-left"></div><div class="wing wing-right"></div><div class="body"></div></div>
    </div>
    <div class="message-box" id="message">
      <h1 id="main-text"></h1>
      <div class="subtitle" id="sub-text"></div>
    </div>
    <button id="next-btn" class="btn" onclick="goToCakeScene()">وقتشه شمع‌های کیک رو فوت کنی... بزن بریم 🎂</button>
  </div>

  <!-- صحنه دوم: کیک تولد -->
  <div id="cake-scene">
    <div class="cake-container" onclick="blowCandle()">
      <div class="cake-bottom"></div>
      <div class="cake-top"></div>
      <div class="candle"><div class="flame" id="flame"></div></div>
    </div>
    <div class="cake-text" id="cake-text">
      چشمانت را ببند و از تـه دل یک آرزوی قشنگ کن... ✨<br>
      <span class="highlight">حالا برای خاموش کردن شمع، روی کیک ضربه بزن</span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    class Particle {
      constructor(x, y, type = 'normal') {
        this.x = x; this.y = y; this.type = type; this.life = 1;
        
        if (type === 'explosion') {
          this.speedX = (Math.random() - 0.5) * 30; this.speedY = (Math.random() - 0.5) * 30;
          this.size = Math.random() * 5 + 2; this.decay = Math.random() * 0.01 + 0.005; this.hue = Math.random() * 80 + 220; 
        } else if (type === 'heart') {
          // ذرات قلب که میرن بالا
          this.speedX = (Math.random() - 0.5) * 1; this.speedY = -(Math.random() * 3 + 1);
          this.size = Math.random() * 3 + 2; this.decay = Math.random() * 0.01 + 0.005; this.hue = 330;document.getElementById('ui-layer').style.display = 'none'; // مخفی کردن شاپرک و متن‌ها
      document.getElementById('cake-scene').style.display = 'block'; // نمایش کیک
      particles = []; // پاک کردن ذرات قبلی
      mode = 'cake';
    }

    // خاموش کردن شمع و انفجار کاغذ رنگی
    let isBlown = false;
    function blowCandle() {
      if(isBlown) return;
      isBlown = true;
      document.getElementById('flame').style.opacity = '0'; // خاموش شدن شعله
      
      const cakeText = document.getElementById('cake-text');
      cakeText.innerHTML = "الهی آرزوهات بشن قشنگ‌ترین خاطره‌هات! 💖<br><span class='highlight'>تولدت هزاران بار مبارک شاپرک جان 🎉🎆</span>";
      
      // انفجار بزرگ کاغذ رنگی از وسط کیک
      for(let i = 0; i < 350; i++) {
        particles.push(new Particle(width/2, height/2 + 50, 'confetti'));
      }
      
      // بارش مداوم کاغذ رنگی از بالای صفحه
      setInterval(() => {
        if(Math.random() > 0.3) {
          let p = new Particle(Math.random() * width, -20, 'confetti');
          p.speedY = Math.random() * 5 + 2; // فقط سقوط به پایین
          p.speedX = (Math.random() - 0.5) * 5;
          particles.push(p);
        }
      }, 100);
    }

    function typeText(text, id, speed, callback) {
      let i = 0; let el = document.getElementById(id); el.innerHTML = "";
      function type() { if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, speed); } else if (callback) setTimeout(callback, 500); }
      type();
    }

    const butterflyEl = document.getElementById('butterfly');
    window.addEventListener('mousemove', (e) => {
      if (mode === 'magic') {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 20; const yAxis = (window.innerHeight / 2 - e.pageY) / 20;
        butterflyEl.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        for(let i = 0; i < 3; i++) particles.push(new Particle(e.clientX, e.clientY, 'normal'));
      }
    });
    window.addEventListener('touchmove', (e) => {
      if (mode === 'magic') {
        let touch = e.touches[0];
        const xAxis = (window.innerWidth / 2 - touch.clientX) / 20; const yAxis = (window.innerHeight / 2 - touch.clientY) / 20;
        butterflyEl.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        for(let i = 0; i < 3; i++) particles.push(new Particle(touch.clientX, touch.clientY, 'normal'));
      }
    });
  </script>
</body>
</html>
