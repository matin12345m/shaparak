<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سورپرایز شاپرک 🦋</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css');
  
  body, html {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background-color: #02010a; overflow: hidden;
    font-family: 'Vazirmatn', sans-serif;
    animation: bgPulse 8s infinite alternate ease-in-out;
  }

  @keyframes bgPulse {
    0% { background-color: #02010a; }
    100% { background-color: #0d041c; }
  }
  
  canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
  
  /* افکت رقص نور (در ابتدا مخفی است) */
  #disco-lights {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
    display: none; pointer-events: none; mix-blend-mode: screen;
    background: radial-gradient(circle at 20% 30%, rgba(255, 0, 150, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 0, 0.2) 0%, transparent 50%);
    animation: discoSpin 1.5s linear infinite alternate;
  }
  @keyframes discoSpin {
    0% { filter: hue-rotate(0deg) brightness(1); transform: scale(1); }
    100% { filter: hue-rotate(360deg) brightness(1.5); transform: scale(1.1); }
  }

  /* صحنه اول: شاپرک */
  #ui-layer {
    position: absolute; z-index: 10; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    transition: opacity 0.8s ease-in-out;
  }

  .btn {
    pointer-events: auto; padding: 15px 40px; font-size: 1.5rem;
    color: #fff; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
    border: 2px solid #a18cd1; border-radius: 30px;
    cursor: pointer; transition: all 0.5s ease;
    box-shadow: 0 0 20px rgba(161, 140, 209, 0.4); text-shadow: 0 0 10px #fff; font-family: inherit;
  }
  
  .btn:hover {
    background: rgba(161, 140, 209, 0.3); transform: scale(1.05);
    box-shadow: 0 0 50px rgba(161, 140, 209, 1);
  }

  #next-btn { display: none; margin-top: 40px; font-size: 1.2rem; }

  /* استایل شاپرک */
  .butterfly-container {
    display: none; perspective: 1000px; margin: 0 auto 30px auto;
    width: 250px; height: 200px; position: relative;
  }
  .butterfly-float { width: 100%; height: 100%; animation: floatButterfly 4s infinite ease-in-out; }
  @keyframes floatButterfly { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
  .wing {
    position: absolute; width: 120px; height: 180px; top: 10px;
    background: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #f093fb 100%);
    box-shadow: 0 0 40px #4facfe, inset 0 0 20px rgba(255, 255, 255, 0.8); opacity: 0.85;
  }
  .wing-left { left: 5px; border-radius: 100% 20% 40% 100%; transform-origin: right center; animation: flapLeft 0.15s infinite alternate ease-in-out; }
  .wing-right { right: 5px; border-radius: 20% 100% 100% 40%; transform-origin: left center; animation: flapRight 0.15s infinite alternate ease-in-out; }
  .body { position: absolute; width: 10px; height: 110px; background: #fff; border-radius: 10px; left: 120px; top: 40px; box-shadow: 0 0 20px #fff; }
  @keyframes flapLeft { 0% { transform: rotateY(0deg) rotateX(20deg); } 100% { transform: rotateY(75deg) rotateX(0deg); } }
  @keyframes flapRight { 0% { transform: rotateY(0deg) rotateX(20deg); } 100% { transform: rotateY(-75deg) rotateX(0deg); } }

  .message-box { display: none; color: #fff; text-align: center; }
  h1 {
    font-size: 3.5rem; margin: 0; background: linear-gradient(to right, #00f2fe, #f093fb, #00f2fe);
    background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: glowText 3s infinite alternate, shineText 5s linear infinite;
  }
  @keyframes shineText { to { background-position: 200% center; } }
  @keyframes glowText { from { filter: drop-shadow(0 0 10px rgba(240, 147, 251, 0.3)); } to { filter: drop-shadow(0 0 30px rgba(0, 242, 254, 0.8)); } }
  .subtitle { font-size: 1.4rem; line-height: 2; margin-top: 20px; color: #e2e8f0; opacity: 0; text-shadow: 0 0 15px rgba(255, 255, 255, 0.4); }

  /* صحنه دوم: کیک تولد شکلاتی */
  #cake-scene {
    position: absolute; z-index: 20; width: 100%; height: 100%;
    display: none; flex-direction: column; justify-content: center; align-items: center;
    opacity: 0; transition: opacity 1s ease-in-out; pointer-events: none;
  }

  .cake-container {
    position: relative; width: 260px; height: 220px; cursor: pointer; pointer-events: auto;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin-bottom: 30px;
  }
  .cake-container:hover { transform: scale(1.05); }
  
  /* بشقاب کیک شیشه‌ای */
  .plate {
    position: absolute; bottom: -20px; left: -10px; width: 280px; height: 75px;
    background: rgba(255, 255, 255, 0.15); border-radius: 50%;
    box-shadow: 0 25px 35px rgba(0,0,0,0.7), inset 0 0 15px rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(8px);
  }
  
  /* بدنه کیک شکلاتی تیره */
  .cake-base {
    position: absolute; bottom: 10px; left: 10px; width: 240px; height: 110px;
    background: linear-gradient(145deg, #4a2511 0%, #2b1104 100%); 
    border-radius: 120px / 40px; 
    box-shadow: inset 0 -10px 30px rgba(0,0,0,0.6), 0 15px 25px rgba(0,0,0,0.7);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    overflow: hidden; /* برای جلوگیری از بیرون زدن نوشته از لبه‌ها */
  }

  /* نوشته خامه‌ای وانیلی روی بدنه کیک */
  .icing-text {
    position: absolute;
    width: 100%;
    top: 30px;
    text-align: center;
    color: #fffaf0; /* رنگ سفید وانیلی */
    font-size: 1.3rem;
    font-weight: 900;
    line-height: 1.3;
    /* افکت سه‌بعدی که حس برجسته بودن خامه رو میده */
    text-shadow: 1px 1px 0px #d4c5b0, 2px 2px 2px rgba(0,0,0,0.5);
    transform: rotate(-3deg); /* کمی کج برای طبیعی بودن */
    z-index: 5;
  }
  
  /* روی کیک (خامه نسکافه‌ای رنگ) */
  .cake-top {
    position: absolute; bottom: 85px; left: 10px; width: 240px; height: 70px;
    background: linear-gradient(to bottom, #8b5a33, #6b3e1b);
    border-radius: 50%;
    box-shadow: inset 0 -5px 15px rgba(0,0,0,0.4), 0 5px 10px rgba(0,0,0,0.3);
  }
  
  /* قطره‌های خامه نسکافه‌ای */
  .drips { position: absolute; width: 240px; height: 60px; bottom: 70px; left: 10px; pointer-events: none; }
  .drip { position: absolute; top: 0; width: 14px; background: #6b3e1b; border-radius: 0 0 10px 10px; box-shadow: 2px 5px 5px rgba(0,0,0,0.4); }
  
  /* شمع سفید و کلاسیک با نوارهای طلایی */
  .candle {
    position: absolute; width: 14px; height: 75px;
    background: linear-gradient(to right, #fdfbfb 0%, #e2e2e2 50%, #ffffff 100%);
    bottom: 140px; left: 123px; border-radius: 4px; box-shadow: 2px 5px 10px rgba(0,0,0,0.5);
  }
  .candle::after {
    /* نوارهای طلایی روی شمع */
    content: ''; position: absolute; top: 15px; left: 0; width: 100%; height: 4px; background: #d4af37;
    box-shadow: 0 20px 0 #d4af37, 0 40px 0 #d4af37; 
  }
  
  /* فتیله شمع */
  .wick { position: absolute; top: -12px; left: 5px; width: 4px; height: 14px; background: #222; border-radius: 2px; transition: background 0.5s; }
  .wick.off { background: #000; }
  
  /* شعله درخشان */
  .flame {
    position: absolute; top: -45px; left: -3px; width: 20px; height: 38px;
    background: #ffcc00; border-radius: 50% 50% 20% 20%;
    box-shadow: 0 0 20px #ffcc00, 0 0 40px #ff6600, 0 0 70px #ff3300;
    animation: flicker 0.1s infinite alternate; transition: opacity 0.3s;
  }
  @keyframes flicker { 0% { transform: scale(1) rotate(-2deg); } 100% { transform: scale(1.1) rotate(2deg); } }
  
  /* دود ملایم بعد از خاموش شدن */
  .smoke {
    position: absolute; top: -40px; left: -3px; width: 20px; height: 20px;
    background: rgba(200, 200, 200, 0.6); border-radius: 50%; opacity: 0; filter: blur(4px); pointer-events: none;
  }
  .puff { animation: smokeRise 2.5s forwards; }
  @keyframes smokeRise { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(4); } }

  /* باکس شیشه‌ای برای متن کیک */
  .glass-box {
    background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px;
    padding: 25px 40px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    max-width: 80%; transition: opacity 0.5s; pointer-events: auto;
  }
  .cake-text-content { font-size: 1.6rem; color: #fff; margin: 0; line-height: 2; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); transition: opacity 0.5s; }
  .highlight { color: #f093fb; font-weight: bold; font-size: 1.9rem; display: block; margin-top: 15px; }

  @media (max-width: 600px) {
    h1 { font-size: 2rem; } .subtitle { font-size: 1.1rem; }
    .butterfly-container { transform: scale(0.7); }
    .cake-container { transform: scale(0.85); margin-bottom: 10px; }
    .cake-container:hover { transform: scale(0.9); }
    .cake-text-content { font-size: 1.2rem; } .highlight { font-size: 1.4rem; }
  }
</style>
</head>
<body>
  
  <audio id="magic-music" loop><source src="tavalod.mp3" type="audio/mpeg"></audio>
  <audio id="cake-music" loop><source src="cake.mp3" type="audio/mpeg"></audio>

  <!-- رقص نور -->
  <div id="disco-lights"></div>

  <canvas id="canvas"></canvas>
  
  <!-- صحنه اول: شاپرک -->
  <div id="ui-layer">
    <button id="start-btn" class="btn" onclick="startMagic()">بریم برای سوووپرایز...؟ پس اینجا رو لمس کن بریم ادامه🙂ن 🦋</button>
    <div class="butterfly-container" id="butterfly">
      <div class="butterfly-float"><div class="wing wing-left"></div><div class="wing wing-right"></div><div class="body"></div></div>
    </div>
    <div class="message-box" id="message">
      <h1 id="main-text"></h1>
      <div class="subtitle" id="sub-text"></div>
    </div>
    <button id="next-btn" class="btn" onclick="goToCakeScene()">بریم برای فوت کردن شمع کیک؟ 😁 اینجا رو کلیک کن</button>
  </div>

  <!-- صحنه دوم: کیک تولد -->
  <div id="cake-scene">
    <div class="cake-container" onclick="blowCandle()">
      <div class="plate"></div>
      
      <div class="cake-base">
        <!-- این همون نوشته‌ی خامه‌ای و طبیعی روی کیک هست -->
        <div class="icing-text">تولدت مبارک<br>شاپرک</div>
      </div>
      
      <!-- قطره‌های خامه نسکافه‌ای -->
      <div class="drips">
        <div class="drip" style="left: 20px; height: 25px;"></div>
        <div class="drip" style="left: 60px; height: 45px;"></div>
        <div class="drip" style="left: 100px; height: 20px;"></div>
        <div class="drip" style="left: 140px; height: 50px;"></div>
        <div class="drip" style="left: 180px; height: 30px;"></div>
        <div class="drip" style="left: 215px; height: 35px;"></div>
      </div>
      
      <div class="cake-top"></div>
      
      <div class="candle">
        <div class="wick" id="wick"></div>
        <div class="flame" id="flame"></div>
        <div class="smoke" id="smoke"></div>
      </div>
    </div>
    
    <div class="glass-box">
      <p class="cake-text-content" id="cake-text">
        چشمانت را ببند و از تـه دل یک آرزوی قشنگ کن... ✨<br>
        <span class="highlight">حالا برای خاموش کردن شمع، روی کیک ضربه بزن</span>
      </p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    class Particle {
      constructor(x, y, type = 'normal') {
        this.x = x; this.y = y; this.type = type; this.life = 1;
        if (type === 'explosion') {
          this.speedX = (Math.random() - 0.5) * 20; this.speedY = (Math.random() - 0.5) * 20;
          this.size = Math.random() * 4 + 2; this.decay = Math.random() * 0.015 + 0.01; this.hue = Math.random() * 80 + 220; 
        } else if (type === 'heart') {
          this.speedX = (Math.random() - 0.5) * 1; this.speedY = -(Math.random() * 3 + 1);
          this.size = Math.random() * 3 + 2; this.decay = Math.random() * 0.01 + 0.005; this.hue = 330; 
        } else if (type === 'confetti') {
          this.speedX = (Math.random() - 0.5) * 20; this.speedY = (Math.random() - 1) * 25;
          this.size = Math.random() * 8 + 6; this.decay = Math.random() * 0.004 + 0.001;
          this.hue = Math.random() * 360; this.angle = Math.random() * 360; this.spin = (Math.random() - 0.5) * 15;
        } else {
          this.speedX = (Math.random() - 0.5) * 2; this.speedY = (Math.random() - 0.5) * 2 - 1; 
          this.decay = Math.random() * 0.02 + 0.01; this.size = Math.random() * 3 + 1; this.hue = Math.random() * 80 + 220; 
        }
      }
      update() {
        this.x += this.speedX; this.y += this.speedY;
        if (this.type === 'explosion') this.speedY += 0.05;
        else if (this.type === 'confetti') { this.speedY += 0.3; this.angle += this.spin; }
        else if (this.type === 'normal') this.speedY -= 0.02;
        this.life -= this.decay;
      }
      draw() {
        if (this.type === 'confetti') {
          ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle * Math.PI / 180);
          ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.life})`;
          ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size); ctx.restore();
        } else {
          ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.life})`;
          ctx.shadowBlur = 10; ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`; ctx.fill();
        }
      }
    }

    function drawSingleHeart() {
      const cx = width / 2; const cy = height / 2 - 20; const scale = 14;
      for (let t = 0; t < Math.PI * 2; t += 0.05) {
        let x = 16 * Math.pow(Math.sin(t), 3); let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
        particles.push(new Particle(cx + x * scale, cy + y * scale, 'heart'));
      }
    }

    function animateParticles() {
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(2, 1, 10, 0.15)'; ctx.fillRect(0, 0, width, height);
      ctx.globalCompositeOperation = 'lighter';
      
      if (Math.random() < 0.1 && mode === 'magic') particles.push(new Particle(Math.random() * width, height + 10, 'normal'));
      
      for (let i = 0; i < particles.length; i++) {
        let p = particles[i]; p.update(); p.draw();
        if (p.life <= 0 || p.y > height + 50 || p.x < -50 || p.x > width + 50) { particles.splice(i, 1); i--; }
      }
      requestAnimationFrame(animateParticles);
    }

    let mode = 'waiting'; animateParticles();

    function startMagic() {
      document.getElementById('magic-music').volume = 0.5;
      document.getElementById('magic-music').play().catch(e=>console.log("music err"));
      document.getElementById('start-btn').style.display = 'none'; mode = 'magic';
      
      for(let i = 0; i < 100; i++) particles.push(new Particle(width/2, height/2, 'explosion'));

      setTimeout(() => {
        document.getElementById('butterfly').style.display = 'block';
        document.getElementById('message').style.display = 'block';
        typeText("شاپرک زیبای من، تولدت مبارک", "main-text", 100, () => {
          const sub = document.getElementById('sub-text');
          sub.innerHTML = "تو مثل این شاپرک، از جنس نوری و تو تاریک‌ترین شب‌ها هم می‌درخشی.<br>آرزو می‌کنم همیشه آزاد، جسور و رها پرواز کنی.";
          sub.style.transition = "opacity 2.5s ease-in-out"; sub.style.opacity = 1;
          drawSingleHeart();
          setTimeout(() => { document.getElementById('next-btn').style.display = 'inline-block'; }, 2000);
        });
      }, 1000);
    }

    function goToCakeScene() {
      document.getElementById('magic-music').pause(); 
      document.getElementById('cake-music').volume = 0.5;
      document.getElementById('cake-music').play().catch(e=>console.log("music err"));

      const uiLayer = document.getElementById('ui-layer');
      const cakeScene = document.getElementById('cake-scene');

      uiLayer.style.opacity = '0';
      
      setTimeout(() => {
        uiLayer.style.display = 'none';
        cakeScene.style.display = 'flex';
        setTimeout(() => {
          cakeScene.style.opacity = '1';
          mode = 'cake';
          particles = []; 
        }, 50);
      }, 800);
    }

    let isBlown = false;
    function blowCandle() {
      if(isBlown) return;
      isBlown = true;
      
      document.getElementById('flame').style.display = 'none'; 
      document.getElementById('wick').classList.add('off');
      document.getElementById('smoke').classList.add('puff');
      
      document.getElementById('disco-lights').style.display = 'block';
      
      const cakeText = document.getElementById('cake-text');
      cakeText.style.opacity = '0';
      
      setTimeout(() => {
        cakeText.innerHTML = "تولدت هزاران بار مبارک شاپرک جان! 🎉<br><span class='highlight'>بزن بریم برای جشن و شادی 💃🕺</span>";
        cakeText.style.opacity = '1';
      }, 500);
      
      for(let i = 0; i < 200; i++) {
        particles.push(new Particle(width/2, height/2, 'confetti'));
      }
      
      setInterval(() => {
        if(Math.random() > 0.3) {
          let p = new Particle(Math.random() * width, -20, 'confetti');
          p.speedY = Math.random() * 4 + 3; p.speedX = (Math.random() - 0.5) * 5; particles.push(p);
        }
      }, 80);
    }

    function typeText(text, id, speed, callback) {
      let i = 0; let el = document.getElementById(id); el.innerHTML = "";
      function type() { if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, speed); } else if (callback) setTimeout(callback, 500); }
      type();
    }
  </script>
</body>
</html>
